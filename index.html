<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #020617;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #94a3b8;
  text-decoration: none;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* NOTIFICATION */
.notify-box {
  position: absolute;
  right: 20px;
  top: 60px;
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
}

/* CHART */
.chart-box {
  margin-top: 30px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Dashboard</h2>
  <a href="#">Home</a>
  <a href="#">Analytics</a>
</div>

<div class="main">

  <div class="header">
    <h2>Dashboard</h2>
    <div>
      <button onclick="toggleNotify()">🔔</button>
    </div>
  </div>

  <div id="notify" class="notify-box">
    <p>New user signed up</p>
    <p>Server updated</p>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Users</h3>
      <p id="users">1200</p>
    </div>
    <div class="card">
      <h3>Revenue</h3>
      <p id="revenue">$5400</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
// NOTIFICATION TOGGLE
function toggleNotify() {
  let box = document.getElementById("notify");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// LOCAL STORAGE DATA
let users = localStorage.getItem("users") || 1200;
let revenue = localStorage.getItem("revenue") || 5400;

document.getElementById("users").innerText = users;
document.getElementById("revenue").innerText = "$" + revenue;

// UPDATE DATA
setInterval(() => {
  users++;
  revenue += 50;

  localStorage.setItem("users", users);
  localStorage.setItem("revenue", revenue);

  document.getElementById("users").innerText = users;
  document.getElementById("revenue").innerText = "$" + revenue;
}, 3000);

// CHART
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    datasets: [{
      label: 'Users Growth',
      data: [10, 20, 30, 25, 40, 50, 60],
      borderWidth: 2
    }]
  }
});
</script>

</body>
</html>
