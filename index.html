<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0f172a;
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.3);
  z-index: 1000;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, #22d3ee, #6366f1);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin-top: 20px;
  color: #94a3b8;
}

/* PROJECTS */
.projects {
  padding: 80px 40px;
}

.projects h2 {
  text-align: center;
  margin-bottom: 40px;
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  background: rgba(255,255,255,0.1);
}

/* SKILLS */
.skills {
  padding: 80px 40px;
}

.skill {
  margin-bottom: 20px;
}

.bar {
  height: 10px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, #22d3ee, #6366f1);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #94a3b8;
}

/* MOBILE */
@media(max-width: 600px) {
  nav {
    padding: 20px;
  }

  .hero h1 {
    font-size: 2rem;
  }
}
</style>
</head>

<body>

<nav>
  <h2>MyPortfolio</h2>
  <div>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
  </div>
</nav>

<section class="hero">
  <h1>Hello, I'm a Full Stack Developer</h1>
  <p>I build modern, scalable web applications.</p>
</section>

<section id="projects" class="projects">
  <h2>Projects</h2>
  <div class="project-grid">
    <div class="card">
      <h3>Spotify Clone</h3>
      <p>Full-stack music streaming app.</p>
    </div>
    <div class="card">
      <h3>AI SaaS Builder</h3>
      <p>Generate websites using AI.</p>
    </div>
    <div class="card">
      <h3>Chat App</h3>
      <p>Realtime messaging system.</p>
    </div>
  </div>
</section>

<section id="skills" class="skills">
  <h2>Skills</h2>

  <div class="skill">
    <p>HTML</p>
    <div class="bar"><div class="fill" style="width:90%"></div></div>
  </div>

  <div class="skill">
    <p>CSS</p>
    <div class="bar"><div class="fill" style="width:85%"></div></div>
  </div>

  <div class="skill">
    <p>JavaScript</p>
    <div class="bar"><div class="fill" style="width:75%"></div></div>
  </div>

</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
