<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #020617;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #94a3b8;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  color: #22d3ee;
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
  position: relative;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 20px #22d3ee;
}

/* CHART PLACEHOLDER */
.chart {
  margin-top: 30px;
  height: 250px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
}

/* MOBILE */
@media(max-width: 768px) {
  .sidebar {
    display: none;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Dashboard</h2>
  <a href="#">Home</a>
  <a href="#">Analytics</a>
  <a href="#">Users</a>
  <a href="#">Settings</a>
</div>

<div class="main">

  <div class="header">
    <h1>Overview</h1>
    <p>User: Admin</p>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Users</h3>
      <p>1,245</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>$8,540</p>
    </div>

    <div class="card">
      <h3>Growth</h3>
      <p>+23%</p>
    </div>
  </div>

  <div class="chart"></div>

</div>

</body>
</html>
