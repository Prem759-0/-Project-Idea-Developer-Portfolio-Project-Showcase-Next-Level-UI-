<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #020617;
  color: white;
  transition: 0.3s;
}

/* LIGHT MODE */
.light {
  background: #f1f5f9;
  color: black;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 20px;
  transition: 0.3s;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #94a3b8;
  text-decoration: none;
}

.sidebar a:hover {
  color: #22d3ee;
}

/* MOBILE SIDEBAR */
.hidden {
  display: none;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BUTTONS */
button {
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* SEARCH */
.search {
  padding: 8px;
  border-radius: 10px;
  border: none;
}

/* MOBILE */
@media(max-width: 768px) {
  .sidebar {
    position: absolute;
    height: 100%;
    z-index: 10;
  }
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
  <h2>⚡ Dashboard</h2>
  <a href="#">Home</a>
  <a href="#">Analytics</a>
  <a href="#">Users</a>
</div>

<div class="main">

  <div class="header">
    <button onclick="toggleSidebar()">☰</button>

    <input class="search" placeholder="Search...">

    <div>
      🔔
      <button onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Users</h3>
      <p id="users">0</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p id="revenue">$0</p>
    </div>

    <div class="card">
      <h3>Growth</h3>
      <p id="growth">0%</p>
    </div>
  </div>

</div>

<script>
// SIDEBAR TOGGLE
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hidden");
}

// DARK MODE
function toggleTheme() {
  document.body.classList.toggle("light");
}

// LIVE DATA SIMULATION
let users = 1000;
let revenue = 5000;
let growth = 20;

setInterval(() => {
  users += Math.floor(Math.random() * 10);
  revenue += Math.floor(Math.random() * 100);
  growth += Math.random();

  document.getElementById("users").innerText = users;
  document.getElementById("revenue").innerText = "$" + revenue;
  document.getElementById("growth").innerText = growth.toFixed(1) + "%";
}, 2000);
</script>

</body>
</html>
