<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro UI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  display: flex;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 20px;
  transition: 0.3s;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #94a3b8;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  color: #22d3ee;
  transform: translateX(5px);
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

/* CARDS */
.cards {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 0 20px rgba(34,211,238,0.4);
}

/* CHART */
.chart-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
}

/* NOTIFICATION */
.notify {
  position: relative;
  cursor: pointer;
}

.notify-box {
  position: absolute;
  right: 0;
  top: 30px;
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  display: none;
}

/* MOBILE */
@media(max-width: 768px) {
  .sidebar {
    position: absolute;
    left: -260px;
  }

  .sidebar.active {
    left: 0;
  }
}
</style>
</head>

<body>

<div id="sidebar" class="sidebar">
  <h2>⚡ UI Panel</h2>
  <a href="#">Dashboard</a>
  <a href="#">Analytics</a>
  <a href="#">Settings</a>
</div>

<div class="main">

  <div class="header">
    <button onclick="toggleSidebar()">☰</button>

    <input class="search" placeholder="Search...">

    <div class="notify" onclick="toggleNotify()">
      🔔
      <div id="notifyBox" class="notify-box">
        <p>New user joined</p>
        <p>Update completed</p>
      </div>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Users</h3>
      <p id="users">1200</p>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <p>$8,450</p>
    </div>

    <div class="card">
      <h3>Growth</h3>
      <p>+32%</p>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
// SIDEBAR
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
}

// NOTIFICATION
function toggleNotify() {
  let box = document.getElementById("notifyBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// FAKE LIVE DATA
let users = 1200;
setInterval(() => {
  users += Math.floor(Math.random() * 5);
  document.getElementById("users").innerText = users;
}, 2000);

// CHART
new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: ['Jan','Feb','Mar','Apr','May','Jun'],
    datasets: [{
      label: 'Growth',
      data: [10,20,30,25,40,60],
      borderWidth: 2
    }]
  }
});
</script>

</body>
</html>
