
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #020617;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  cursor: pointer;
  color: #94a3b8;
}

.sidebar a:hover {
  color: #22d3ee;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* PAGES */
.page {
  display: none;
}

.active {
  display: block;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
}

/* INPUT */
input {
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ SaaS</h2>
  <a onclick="showPage('dashboard')">Dashboard</a>
  <a onclick="showPage('analytics')">Analytics</a>
  <a onclick="showPage('profile')">Profile</a>
  <a onclick="showPage('settings')">Settings</a>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active">
    <h2>Dashboard</h2>

    <div class="cards">
      <div class="card"><h3>Users</h3><p id="users">1200</p></div>
      <div class="card"><h3>Revenue</h3><p>$8450</p></div>
    </div>
  </div>

  <!-- ANALYTICS -->
  <div id="analytics" class="page">
    <h2>Analytics</h2>
    <canvas id="chart"></canvas>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="page">
    <h2>Profile</h2>
    <input placeholder="Name"><br>
    <input placeholder="Email"><br>
    <button>Save</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="page">
    <h2>Settings</h2>
    <p>Dark Mode</p>
    <button onclick="toggleTheme()">Toggle</button>
  </div>

</div>

<script>
// PAGE SWITCH
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// THEME
function toggleTheme() {
  document.body.classList.toggle("light");
}

// FAKE DATA
let users = 1200;
setInterval(() => {
  users += Math.floor(Math.random() * 5);
  document.getElementById("users").innerText = users;
}, 2000);

// CHART
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri'],
    datasets: [{
      label: 'Traffic',
      data: [12,19,8,15,20]
    }]
  }
});
</script>

</body>
</html>
